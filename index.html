<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Question 02 - English</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #ffffff;
            --text-main: #000000;
            --academic-gray: #4b5563;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #e5e7eb;
            color: var(--text-main);
            -webkit-print-color-adjust: exact;
        }

        .academic-serif { font-family: 'Lora', serif; }
        .hind-siliguri { font-family: 'Hind Siliguri', sans-serif; }
        
        .paper {
            background: var(--paper-bg);
            max-width: 800px;
            margin: 2rem auto;
            padding: 4rem 5rem;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            min-height: 297mm;
            position: relative;
            line-height: 1.5;
        }

        .header-top {
            text-align: center;
            border-bottom: 3px double #000;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .exam-info-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #000;
            padding-bottom: 0.5rem;
        }

        .passage-section {
            margin: 2rem 0;
            text-align: justify;
        }

        .passage-title {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: block;
            letter-spacing: 0.05em;
        }

        .passage-text {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            line-height: 1.7;
            padding: 0 1rem;
        }

        .question-block {
            margin-bottom: 2.5rem;
            position: relative;
        }

        .marks {
            float: right;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .instr {
            font-weight: 700;
            margin-bottom: 1rem;
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px 15px;
            vertical-align: top;
        }

        .mcq-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 0.5rem 2rem;
            margin-top: 0.5rem;
            padding-left: 1.5rem;
        }

        @media print {
            body { background: white; margin: 0; }
            .paper { box-shadow: none; margin: 0; padding: 2rem; width: 100%; max-width: none; }
            .no-print { display: none; }
            .page-break { page-break-before: always; }
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(0,0,0,0.03);
            pointer-events: none;
            white-space: nowrap;
            z-index: 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="no-print fixed top-6 right-6 z-50 flex flex-col gap-3">
        <button onclick="window.print()" class="bg-black text-white px-6 py-3 rounded-full font-bold shadow-lg flex items-center gap-2 hover:scale-105 transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print Paper
        </button>
    </div>

    <div id="app" class="paper">
        <div class="text-center py-20">
            <div class="animate-spin h-8 w-8 border-4 border-slate-300 border-t-black rounded-full mx-auto mb-4"></div>
            <p class="text-slate-500 font-medium">Preparing Examination Paper...</p>
        </div>
    </div>

    <script>
        const appContainer = document.getElementById('app');

        const MARKS_MAP = {
            1: 5, 2: 5, 3: 12, 4: 5, 5: 5, 6: 10, 7: 10, 8: 10, 9: 5, 10: 5
        };

        async function loadExam() {
            try {
                const response = await fetch('mq.json');
                if (!response.ok) throw new Error('Could not find mq.json');
                const data = await response.json();
                renderPaper(data);
            } catch (error) {
                appContainer.innerHTML = `<div class="text-center py-20 text-red-500">Error: mq.json not found.</div>`;
            }
        }

        function renderPaper(data) {
            let html = `
                <div class="watermark">Question Paper</div>
                <div class="header-top">
                    <h1 class="academic-serif text-3xl font-bold uppercase mb-1">Board of Primary Education</h1>
                    <h2 class="text-xl font-semibold mb-2">Model Question Examination - ${data.year}</h2>
                    <p class="text-lg academic-serif italic">Subject: ${data.subject} (English Version)</p>
                </div>

                <div class="exam-info-grid">
                    <div>Class: ${data.class}</div>
                    <div class="text-right">Time: 2 Hours 30 Minutes</div>
                    <div>Set: ${data.model_id}</div>
                    <div class="text-right">Full Marks: 100</div>
                </div>

                <div class="mb-10 text-center font-bold text-sm border p-2 bg-slate-50">
                    [Answer all the questions. Figures in the right-hand margin indicate full marks.]
                </div>
            `;

            data.full_exam.forEach((sec, sIdx) => {
                if (sec.passage) {
                    html += `
                        <div class="passage-section">
                            <span class="passage-title">Read the following passage carefully:</span>
                            <div class="passage-text hind-siliguri">${sec.passage}</div>
                        </div>
                    `;
                }

                sec.questions.forEach(q => {
                    html += `<div class="question-block">
                        <span class="marks">[${MARKS_MAP[q.id] || ''}]</span>
                        <span class="instr"><span class="mr-2">${q.id}.</span> ${q.instruction}</span>
                    `;

                    if (q.type === 'matching') {
                        html += `
                            <table>
                                <thead>
                                    <tr><th>Column A</th><th>Column B</th></tr>
                                </thead>
                                <tbody>
                                    ${q.columnA.map((colA, i) => `
                                        <tr>
                                            <td>${String.fromCharCode(97+i)}) ${colA}</td>
                                            <td>${q.columnB[i] ? q.columnB[i].id + ') ' + q.columnB[i].text : ''}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    } else if (q.type === 'sentence_making') {
                        html += `<div class="flex gap-4 mt-2 italic font-bold">Words: ${q.words.join(', ')}</div>`;
                    } else if (q.type === 'short_answer' || q.type === 'descriptive') {
                        html += `
                            <ol class="list-[lower-alpha] ml-8 space-y-2 mt-2 font-medium">
                                ${q.items.map(item => `<li>${item}</li>`).join('')}
                            </ol>
                        `;
                    } else if (q.type === 'fill_in_the_blanks') {
                        html += `
                            <div class="border border-black p-3 text-center my-3 font-bold">
                                ${q.clues.join(' | ')}
                            </div>
                            <ol class="list-[lower-alpha] ml-8 space-y-2 mt-2">
                                ${q.items.map(item => `<li>${item}</li>`).join('')}
                            </ol>
                        `;
                    } else if (q.type === 'mcq') {
                        html += q.items.map((item, idx) => `
                            <div class="mt-4">
                                <p class="font-bold">${String.fromCharCode(97+idx)}) ${item.q}</p>
                                <div class="mcq-grid">
                                    ${item.options.map((opt, i) => `<span>(${['i','ii','iii','iv'][i]}) ${opt}</span>`).join('')}
                                </div>
                            </div>
                        `).join('');
                    } else if (q.type === 'wh_questions') {
                        html += `
                            <ol class="list-[lower-alpha] ml-8 space-y-2 mt-2">
                                ${q.items.map(item => `<li>${item.text.replace(item.underlined, `<u>${item.underlined}</u>`)}</li>`).join('')}
                            </ol>
                        `;
                    } else if (q.type === 'rearrange') {
                        html += `
                            <ol class="list-[lower-alpha] ml-8 space-y-2 mt-2 italic">
                                ${q.items.map(item => `<li>${item}</li>`).join('')}
                            </ol>
                        `;
                    } else if (q.type === 'punctuation') {
                        html += `<div class="italic p-4 bg-slate-50 border mt-2 academic-serif">${q.text}</div>`;
                    } else if (q.type === 'form_filling') {
                        html += `
                            <div class="border-2 border-black p-10 mt-6 max-w-lg mx-auto relative page-break">
                                <div class="absolute top-6 right-6 border border-black w-24 h-28 flex items-center justify-center text-[10px] uppercase font-bold text-slate-400">Photo</div>
                                <h3 class="text-center font-bold text-xl uppercase mb-8 underline">Registration Form</h3>
                                ${q.fields.map(f => `
                                    <div class="flex mb-5 items-end">
                                        <span class="w-40 text-sm font-bold uppercase">${f}</span>
                                        <span class="mr-3">:</span>
                                        <div class="flex-1 border-b border-dotted border-slate-400 h-5"></div>
                                    </div>
                                `).join('')}
                                <div class="mt-16 flex justify-between text-xs font-bold uppercase">
                                    <span class="border-t border-black pt-1">Guardian's Signature</span>
                                    <span class="border-t border-black pt-1">Candidate's Signature</span>
                                </div>
                            </div>
                        `;
                    }
                    html += `</div>`;
                });
            });

            appContainer.innerHTML = html;
        }

        window.onload = loadExam;
    </script>
</body>
</html>
