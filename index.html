<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Question 02 - Exam Paper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #ffffff;
            --text-main: #1a1a1a;
            --border-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            color: var(--text-main);
        }

        .hind-siliguri { font-family: 'Hind Siliguri', sans-serif; }
        
        .paper {
            background: var(--paper-bg);
            max-width: 850px;
            margin: 2rem auto;
            padding: 3rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            min-height: 297mm; /* A4 Ratio */
            position: relative;
        }

        .exam-header {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }

        .passage-box {
            background: #f9fafb;
            padding: 1.5rem;
            border-left: 4px solid #4b5563;
            margin: 1.5rem 0;
            line-height: 1.6;
            font-style: italic;
        }

        .question-item {
            margin-bottom: 2rem;
        }

        .question-number {
            font-weight: bold;
            margin-right: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px 12px;
            text-align: left;
        }

        .matching-col { width: 50%; }

        @media print {
            body { background: white; }
            .paper { box-shadow: none; margin: 0; padding: 1.5rem; max-width: 100%; }
            .no-print { display: none; }
            .page-break { page-break-before: always; }
        }

        .input-line {
            border: none;
            border-bottom: 1px dotted #000;
            width: 100%;
            padding: 4px 0;
            background: transparent;
            outline: none;
        }
        
        .mcq-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: #1e293b;
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary:hover { background: #334155; }
    </style>
</head>
<body>

    <!-- UI Controls -->
    <div class="no-print sticky top-0 bg-white/80 backdrop-blur-md border-b p-4 flex justify-between items-center z-50">
        <h1 class="font-bold text-slate-800">Exam Prep Portal</h1>
        <div class="flex gap-4">
            <button onclick="window.print()" class="text-slate-600 hover:text-black flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                Print Paper
            </button>
            <button onclick="submitExam()" class="btn-primary">Finish Exam</button>
        </div>
    </div>

    <div id="app" class="paper">
        <div class="text-center py-10">
            <div class="animate-pulse text-slate-400">Loading Question Paper...</div>
        </div>
    </div>

    <script>
        const appContainer = document.getElementById('app');

        // Function to render the matching table
        function renderMatching(q) {
            let html = `<div class="question-item">
                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>
                <table>
                    <thead>
                        <tr class="bg-slate-50">
                            <th>Column A</th>
                            <th>Column B</th>
                        </tr>
                    </thead>
                    <tbody>`;
            
            const maxLength = Math.max(q.columnA.length, q.columnB.length);
            for(let i=0; i < maxLength; i++) {
                html += `<tr>
                    <td>${q.columnA[i] ? String.fromCharCode(97 + i) + ') ' + q.columnA[i] : ''}</td>
                    <td>${q.columnB[i] ? q.columnB[i].id + ') ' + q.columnB[i].text : ''}</td>
                </tr>`;
            }

            html += `</tbody></table></div>`;
            return html;
        }

        // Function to render MCQ
        function renderMCQ(q) {
            let html = `<div class="question-item">
                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>`;
            
            q.items.forEach((item, index) => {
                html += `<div class="mt-4">
                    <p class="font-medium">(${String.fromCharCode(97 + index)}) ${item.q}</p>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        ${item.options.map((opt, i) => `
                            <label class="mcq-option cursor-pointer hover:bg-slate-50 p-1 rounded">
                                <input type="radio" name="q${q.id}_${index}" value="${opt}">
                                <span>(${['i','ii','iii','iv'][i]}) ${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
            });

            html += `</div>`;
            return html;
        }

        // Main Data Fetching
        async function loadExam() {
            try {
                // In a real environment, this fetches mq.json
                // For this demo, we use the local data
                const response = await fetch('mq.json');
                if (!response.ok) throw new Error('Could not find mq.json');
                const data = await response.json();
                renderPaper(data);
            } catch (error) {
                console.error(error);
                appContainer.innerHTML = `
                    <div class="text-red-500 text-center p-10 bg-red-50 rounded-lg border border-red-200">
                        <h2 class="font-bold text-xl">Error Loading Paper</h2>
                        <p>Make sure "mq.json" is in the same folder as this HTML file.</p>
                        <button onclick="location.reload()" class="mt-4 btn-primary">Retry</button>
                    </div>
                `;
            }
        }

        function renderPaper(data) {
            let html = `
                <div class="exam-header">
                    <h1 class="text-2xl font-bold uppercase tracking-widest mb-1">Model Question - ${data.model_id}</h1>
                    <p class="text-slate-600 font-medium">Subject: ${data.subject} | Class: ${data.class}</p>
                    <div class="flex justify-between mt-6 text-sm font-semibold">
                        <span>Time: 2 Hours 30 Minutes</span>
                        <span>Full Marks: 100</span>
                    </div>
                </div>

                <div class="flex justify-between mb-8 border-b pb-4 gap-4 no-print">
                    <div class="flex-1">
                        <label class="text-xs uppercase text-slate-500 font-bold">Student Name</label>
                        <input type="text" class="input-line" placeholder="Enter name here...">
                    </div>
                    <div class="w-24">
                        <label class="text-xs uppercase text-slate-500 font-bold">Roll No</label>
                        <input type="text" class="input-line">
                    </div>
                </div>
            `;

            data.full_exam.forEach((sec, sIdx) => {
                html += `<div class="section-title mt-10 mb-4 bg-slate-800 text-white px-4 py-1 inline-block rounded text-sm uppercase tracking-wider">${sec.section}</div>`;
                
                if(sec.passage) {
                    html += `<div class="passage-box hind-siliguri">${sec.passage}</div>`;
                    html += `<p class="text-sm font-bold italic mb-6">Read the text and answer the questions below:</p>`;
                }

                sec.questions.forEach(q => {
                    if (q.type === 'matching') {
                        html += renderMatching(q);
                    } else if (q.type === 'sentence_making') {
                        html += `
                            <div class="question-item">
                                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>
                                <div class="flex flex-wrap gap-4 mt-2 font-bold text-slate-700">
                                    ${q.words.map(w => `<span class="border px-3 py-1 bg-white rounded shadow-sm">${w}</span>`).join('')}
                                </div>
                                <div class="mt-4 space-y-4">
                                    ${q.words.map(() => `<div class="input-line h-8 border-b-black"></div>`).join('')}
                                </div>
                            </div>
                        `;
                    } else if (q.type === 'short_answer' || q.type === 'descriptive') {
                        html += `
                            <div class="question-item">
                                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>
                                <ol class="list-[lower-alpha] ml-10 space-y-4 mt-2">
                                    ${q.items.map(item => `<li>${item} <div class="input-line h-6"></div></li>`).join('')}
                                </ol>
                            </div>
                        `;
                    } else if (q.type === 'fill_in_the_blanks') {
                        html += `
                            <div class="question-item">
                                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>
                                <div class="border-2 border-dashed border-slate-300 p-4 rounded-lg flex flex-wrap gap-4 justify-center my-4 font-semibold text-blue-700">
                                    ${q.clues.map(c => `<span>${c}</span>`).join(' | ')}
                                </div>
                                <ul class="space-y-3 mt-4">
                                    ${q.items.map((item, i) => `<li>(${String.fromCharCode(97+i)}) ${item}</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    } else if (q.type === 'mcq') {
                        html += renderMCQ(q);
                    } else if (q.type === 'wh_questions') {
                        html += `
                            <div class="question-item">
                                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>
                                <ul class="list-[lower-alpha] ml-10 space-y-3 mt-2">
                                    ${q.items.map(item => `<li>${item.text.replace(item.underlined, `<u>${item.underlined}</u>`)} <div class="input-line h-6"></div></li>`).join('')}
                                </ul>
                            </div>
                        `;
                    } else if (q.type === 'rearrange') {
                        html += `
                            <div class="question-item">
                                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>
                                <ul class="list-[lower-alpha] ml-10 space-y-3 mt-2">
                                    ${q.items.map(item => `<li>${item} <div class="input-line h-6"></div></li>`).join('')}
                                </ul>
                            </div>
                        `;
                    } else if (q.type === 'punctuation') {
                        html += `
                            <div class="question-item">
                                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>
                                <div class="italic text-slate-500 p-3 bg-slate-50 rounded mt-2">${q.text}</div>
                                <div class="input-line h-16 mt-2"></div>
                            </div>
                        `;
                    } else if (q.type === 'form_filling') {
                        html += `
                            <div class="question-item page-break">
                                <p><span class="question-number">${q.id}.</span> ${q.instruction}</p>
                                <div class="border-2 border-black p-8 mt-4 max-w-md mx-auto relative">
                                    <div class="absolute top-4 right-4 border border-black w-24 h-28 flex items-center justify-center text-xs text-slate-400">Photo</div>
                                    <h3 class="text-center font-bold text-lg mb-6">Application Form</h3>
                                    ${q.fields.map(f => `
                                        <div class="flex mb-4 items-end">
                                            <span class="w-32 text-sm font-semibold">${f}</span>
                                            <span class="mr-2">:</span>
                                            <div class="flex-1 border-b border-black h-5"></div>
                                        </div>
                                    `).join('')}
                                    <div class="mt-12 text-right">
                                        <div class="inline-block border-t border-black px-8 py-1 text-sm font-bold">Signature</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            });

            appContainer.innerHTML = html;
        }

        function submitExam() {
            const btn = event.target;
            btn.innerHTML = "Submitting...";
            btn.disabled = true;
            
            setTimeout(() => {
                alert("Success! Your answers have been recorded for evaluation. Good luck!");
                btn.innerHTML = "Exam Finished";
            }, 1500);
        }

        window.onload = loadExam;
    </script>
</body>
</html>
